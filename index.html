<title>Hazel & Doohyung Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#131311; color:#ece7dd; font-family:"Noto Sans TC",sans-serif; font-weight:300;
    padding:24px;
  }
  .lock { width:100%; max-width:340px; text-align:center; }
  .ring { width:44px; height:44px; border:2px solid #c9a86a; border-radius:50%; margin:0 auto 8px; position:relative; }
  .ring::after { content:""; position:absolute; top:-12px; left:50%; width:12px; height:12px;
    transform:translateX(-50%) rotate(45deg); background:#c9a86a; }
  h1 { font-family:"Cormorant Garamond",serif; font-weight:600; font-size:24px; letter-spacing:.18em; margin:22px 0 6px; }
  p  { font-size:14px; color:#a49d92; margin-bottom:28px; }
  input {
    width:100%; padding:13px 16px; font-size:16px; text-align:center; letter-spacing:.3em;
    background:#1b1b18; color:#ece7dd; border:1px solid rgba(236,231,221,.18); border-radius:12px;
    font-family:inherit;
  }
  input:focus { outline:none; border-color:#c9a86a; }
  button {
    width:100%; margin-top:14px; padding:13px; font-size:15px; font-weight:500; font-family:inherit;
    background:#c9a86a; color:#1a1508; border:0; border-radius:12px; cursor:pointer;
  }
  button:active { transform:scale(.99); }
  .err { color:#d98a8a; font-size:13px; margin-top:14px; min-height:18px; }
</style>
</head>

    document.open(); document.write(html); document.close();
  } catch(e) {
    if (!silent) err.textContent = "密碼不對,再試一次";
  }
}
document.getElementById("go").addEventListener("click", () => tryUnlock(document.getElementById("pw").value.trim()));
document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(e.target.value.trim()); });
try { const saved = sessionStorage.getItem("wedding_pw"); if (saved) tryUnlock(saved, true); } catch(e) {}
</script>
